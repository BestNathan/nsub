# rules/simple.toml — 极简: 去重 + 过滤 → 全部有效节点

[[dedup]]
name = "main"
host = ".*"
port = ".*"

[[exclude]]
name = "ad"
fragment = "超过20多个|客户端设置|电报群|防失联|剩余流量|套餐到期|每次使用前|https?://"

[[exclude]]
name = "placeholder"
host = "1\\.1\\.1\\.1|2\\.2\\.2\\.2"

# 管道: 去重 → 过滤广告
[[pipeline]]
name = "all"
steps = ["dedup.main", "exclude.ad", "exclude.placeholder"]
